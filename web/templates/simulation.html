<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflation Simulation — Graph</title>
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
            color: #fffffe;
        }

        header {
            background: #0f0e17;
            padding: 0 16px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid #2a2a3e;
        }

        header span { font-weight: 600; font-size: 0.95rem; }

        header a {
            color: #a7a9be;
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.15s;
        }
        header a:hover { color: #fffffe; }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #network-container {
            flex: 1;
            position: relative;
            background: #16213e;
        }

        #network {
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 310px;
            background: #0f0e17;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #2a2a3e;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 10px 14px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a7a9be;
            border-bottom: 1px solid #2a2a3e;
            flex-shrink: 0;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .sidebar-body::-webkit-scrollbar { width: 4px; }
        .sidebar-body::-webkit-scrollbar-track { background: transparent; }
        .sidebar-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .hint {
            color: #a7a9be;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 48px;
            line-height: 1.5;
        }

        .node-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            word-break: break-all;
        }

        .layer-badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.03em;
        }

        .badge-raw       { background: #1565c0; color: #e3f2fd; }
        .badge-processed { background: #bf360c; color: #fbe9e7; }
        .badge-consumer  { background: #6a1b9a; color: #f3e5f5; }
        .badge-global    { background: #1b5e20; color: #e8f5e9; }

        .info-section { margin-bottom: 18px; }

        .info-section h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #a7a9be;
            margin-bottom: 8px;
        }

        .section-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .section-title-row h4 { margin-bottom: 0; }

        .comp-item {
            display: flex;
            align-items: center;
            padding: 4px 0;
            font-size: 0.78rem;
            border-bottom: 1px solid #1e1e30;
            gap: 6px;
        }

        .comp-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #d0d0e8;
        }

        .comp-bar {
            width: 60px;
            height: 4px;
            background: #2a2a4e;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .comp-bar-fill {
            height: 100%;
            background: #7986cb;
            border-radius: 2px;
        }

        .comp-pct {
            font-size: 0.72rem;
            color: #a7a9be;
            min-width: 34px;
            text-align: right;
            flex-shrink: 0;
        }

        .prop-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.78rem;
            border-bottom: 1px solid #1e1e30;
        }

        .prop-key { color: #a7a9be; }
        .prop-val { color: #fffffe; font-variant-numeric: tabular-nums; }

        .toolbar {
            padding: 8px 12px;
            background: #0f0e17;
            border-top: 1px solid #2a2a3e;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn {
            padding: 5px 13px;
            border-radius: 4px;
            border: 1px solid #3a3a5e;
            background: #1a1a2e;
            color: #d0d0e8;
            cursor: pointer;
            font-size: 0.78rem;
            transition: background 0.15s;
        }
        .btn:hover { background: #2a2a4e; }

        .legend {
            display: flex;
            gap: 14px;
            margin-left: auto;
            align-items: center;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: #a7a9be;
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        /* --- Pie chart styles --- */

        .btn-xs {
            padding: 2px 7px;
            font-size: 0.67rem;
            border-radius: 3px;
            border: 1px solid #3a3a5e;
            background: transparent;
            color: #a7a9be;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            line-height: 1.4;
        }
        .btn-xs:hover { background: #2a2a4e; color: #fffffe; }
        .btn-xs.active { background: #2e3461; color: #c5cae9; border-color: #5c6bc0; }

        .pie-container {
            margin-top: 8px;
            padding: 10px;
            background: #111128;
            border-radius: 5px;
            border: 1px solid #222244;
        }

        .pie-canvas-wrap {
            position: relative;
            height: 185px;
        }

        .weight-editor {
            margin-top: 8px;
            max-height: 130px;
            overflow-y: auto;
        }
        .weight-editor::-webkit-scrollbar { width: 3px; }
        .weight-editor::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .weight-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 0;
            border-bottom: 1px solid #1a1a30;
            font-size: 0.71rem;
        }

        .pie-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .weight-label {
            flex: 1;
            color: #c0c0d8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .weight-input {
            width: 62px;
            padding: 2px 5px;
            background: #1a1a30;
            border: 1px solid #3a3a5e;
            border-radius: 3px;
            color: #fffffe;
            font-size: 0.71rem;
            text-align: right;
            flex-shrink: 0;
        }
        .weight-input:focus { outline: none; border-color: #7986cb; }

        .pie-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .apply-btn {
            padding: 3px 11px;
            font-size: 0.71rem;
            border-radius: 3px;
            border: 1px solid #5c6bc0;
            background: #3949ab;
            color: #e8eaf6;
            cursor: pointer;
            transition: background 0.15s;
        }
        .apply-btn:hover { background: #4a5abc; }
        .apply-btn:disabled { opacity: 0.6; cursor: default; }

        .cancel-btn {
            padding: 3px 11px;
            font-size: 0.71rem;
            border-radius: 3px;
            border: 1px solid #3a3a5e;
            background: transparent;
            color: #a7a9be;
            cursor: pointer;
            transition: background 0.15s;
        }
        .cancel-btn:hover { background: #2a2a4e; color: #fffffe; }

        .pie-legend-list { margin-top: 6px; }

        .pie-legend-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 2px 0;
            font-size: 0.70rem;
            color: #c0c0d8;
        }
    </style>
</head>
<body>
    <header>
        <span>Inflation Simulation &mdash; Supply Chain Graph</span>
        <a href="/">&larr; New Simulation</a>
    </header>

    <div class="main">
        <div id="network-container">
            <div id="network"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">Node Information</div>
            <div class="sidebar-body" id="sidebar-body">
                <p class="hint">Click on any node<br>to see its details.</p>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn" onclick="resetView()">&#8635; Reset View</button>
        <button class="btn" onclick="exportPNG()">&#8659; Export PNG</button>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:#97c2fc"></div>Raw
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#ffca50"></div>Processed
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#fb7e81"></div>Consumer
            </div>
        </div>
    </div>

    <script>
        let network, nodes, edges;

        fetch('/api/graph')
            .then(r => r.json())
            .then(data => {
                nodes = new vis.DataSet(data.nodes);
                edges = new vis.DataSet(data.edges);

                const options = {
                    layout: {
                        hierarchical: {
                            enabled: true,
                            direction: 'UD',
                            sortMethod: 'directed',
                            levelSeparation: 170,
                            nodeSpacing: 90,
                            treeSpacing: 120,
                        }
                    },
                    groups: {
                        raw: {
                            color: {
                                background: '#97c2fc', border: '#5b8ecc',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                        processed: {
                            color: {
                                background: '#ffca50', border: '#cc9a00',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                        consumer: {
                            color: {
                                background: '#fb7e81', border: '#c45052',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                        global: {
                            color: {
                                background: '#7be141', border: '#4fa31e',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                    },
                    nodes: {
                        shape: 'ellipse',
                        font: { size: 11, color: '#1a1a2e', bold: true },
                        borderWidth: 1.5,
                        size: 20,
                    },
                    edges: {
                        arrows: { to: { enabled: true, scaleFactor: 0.55 } },
                        color: { color: '#44446a', opacity: 0.8 },
                        width: 1,
                        smooth: { type: 'cubicBezier', forceDirection: 'vertical' },
                    },
                    physics: { enabled: false },
                    interaction: {
                        hover: true,
                        zoomView: true,
                        dragView: true,
                        tooltipDelay: 300,
                        selectConnectedEdges: false,
                    },
                };

                const container = document.getElementById('network');
                network = new vis.Network(container, { nodes, edges }, options);

                network.on('click', function (params) {
                    if (params.nodes.length > 0) {
                        const nodeId = params.nodes[0];
                        highlightEdges(nodeId);
                        fetchNodeInfo(nodeId);
                    } else if (params.nodes.length === 0 && params.edges.length === 0) {
                        resetEdgeColors();
                        showHint();
                    }
                });
            });

        function highlightEdges(nodeId) {
            const updates = [];
            edges.forEach(edge => {
                if (edge.to === nodeId) {
                    updates.push({ id: edge.id, color: { color: '#2196f3', opacity: 1 }, width: 2.5 });
                } else if (edge.from === nodeId) {
                    updates.push({ id: edge.id, color: { color: '#4caf50', opacity: 1 }, width: 2.5 });
                } else {
                    updates.push({ id: edge.id, color: { color: '#222240', opacity: 0.25 }, width: 1 });
                }
            });
            edges.update(updates);
        }

        function resetEdgeColors() {
            const updates = [];
            edges.forEach(edge => {
                updates.push({ id: edge.id, color: { color: '#44446a', opacity: 0.8 }, width: 1 });
            });
            edges.update(updates);
        }

        function fetchNodeInfo(nodeId) {
            fetch('/api/node/' + encodeURIComponent(nodeId))
                .then(r => r.json())
                .then(info => renderNodeInfo(info, nodeId));
        }

        const BADGE_CLASSES = {
            'Raw Material':       'badge-raw',
            'Processed Material': 'badge-processed',
            'Consumer Product':   'badge-consumer',
            'Global':             'badge-global',
        };

        function renderNodeInfo(info, nodeId) {
            destroyActiveCharts();
            const badge = BADGE_CLASSES[info.layer] || 'badge-raw';
            let html = `<div class="node-name">${info.name}</div>
                        <div class="layer-badge ${badge}">${info.layer}</div>`;

            const props = [['ID', info.id]];
            if (info.unit_cost !== undefined) props.push(['Unit Cost', info.unit_cost]);
            if (info.units_avail !== undefined) props.push(['Units Available', info.units_avail]);
            if (info.num_components !== undefined) props.push(['# Components', info.num_components]);
            html += buildPropertiesSection('Properties', props);

            if (info.components) {
                html += buildCompositionSection('Components', info.components, '#7986cb', nodeId);
            }

            if (info.raw_composition) {
                html += buildCompositionSection('Raw Material Composition', info.raw_composition, '#80cbc4', null);
            }

            document.getElementById('sidebar-body').innerHTML = html;
        }

        function buildPropertiesSection(title, props) {
            let html = `<div class="info-section"><h4>${title}</h4>`;
            for (const [key, val] of props) {
                html += `<div class="prop-item">
                    <span class="prop-key">${key}</span>
                    <span class="prop-val">${val}</span>
                </div>`;
            }
            html += `</div>`;
            return html;
        }

        function buildCompositionSection(title, data, barColor, editableNodeId) {
            const secId = editableNodeId ? 'comp' : 'raw';
            _sectionData[secId] = { data, barColor, editableNodeId: editableNodeId || null };

            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
            let html = `<div class="info-section">
                <div class="section-title-row">
                    <h4>${title}</h4>
                    <button class="btn-xs" id="pie-btn-${secId}" onclick="togglePie('${secId}')">&#9685; Pie</button>
                </div>`;

            for (const [name, weight] of sorted) {
                const pct = (weight * 100).toFixed(1);
                html += `<div class="comp-item">
                    <span class="comp-label" title="${name}">${name}</span>
                    <div class="comp-bar">
                        <div class="comp-bar-fill" style="width:${pct}%;background:${barColor}"></div>
                    </div>
                    <span class="comp-pct">${pct}%</span>
                </div>`;
            }

            html += `<div id="pie-container-${secId}" class="pie-container" style="display:none">
                <div class="pie-canvas-wrap"><canvas id="pie-canvas-${secId}"></canvas></div>`;

            if (editableNodeId) {
                html += `<div id="weight-editor-${secId}" class="weight-editor"></div>
                    <div class="pie-actions">
                        <button class="cancel-btn" onclick="togglePie('${secId}')">Cancel</button>
                        <button class="apply-btn" onclick="applyWeights('${secId}')">Apply</button>
                    </div>`;
            } else {
                html += `<div id="pie-legend-${secId}" class="pie-legend-list"></div>`;
            }

            html += `</div></div>`;
            return html;
        }

        function showHint() {
            document.getElementById('sidebar-body').innerHTML =
                '<p class="hint">Click on any node<br>to see its details.</p>';
        }

        function resetView() {
            if (!network) return;
            network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
            resetEdgeColors();
            showHint();
            network.unselectAll();
        }

        function exportPNG() {
            if (!network) return;
            const canvas = network.canvas.frame.canvas;
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'simulation_graph.png';
            link.click();
        }

        /* ---- Pie chart logic ---- */

        const _sectionData = {};
        let _activeCharts = {};

        const PIE_COLORS = [
            '#7986cb', '#80cbc4', '#ffb74d', '#ef5350', '#66bb6a',
            '#26c6da', '#ab47bc', '#ec407a', '#ff7043', '#42a5f5',
            '#d4e157', '#26a69a'
        ];

        function getPieColors(n) {
            return Array.from({ length: n }, (_, i) => PIE_COLORS[i % PIE_COLORS.length]);
        }

        function destroyActiveCharts() {
            Object.values(_activeCharts).forEach(c => c.destroy());
            for (const k in _activeCharts) delete _activeCharts[k];
        }

        function togglePie(secId) {
            const container = document.getElementById('pie-container-' + secId);
            const btn = document.getElementById('pie-btn-' + secId);
            if (!container || !btn) return;

            const isHidden = !container.style.display || container.style.display === 'none';
            if (isHidden) {
                container.style.display = 'block';
                btn.classList.add('active');
                if (_activeCharts[secId]) { _activeCharts[secId].destroy(); delete _activeCharts[secId]; }
                const { data, editableNodeId } = _sectionData[secId];
                if (editableNodeId) buildEditablePie(secId, data);
                else buildReadOnlyPie(secId, data);
            } else {
                container.style.display = 'none';
                btn.classList.remove('active');
                if (_activeCharts[secId]) { _activeCharts[secId].destroy(); delete _activeCharts[secId]; }
            }
        }

        function buildReadOnlyPie(secId, data) {
            const canvas = document.getElementById('pie-canvas-' + secId);
            if (!canvas) return;

            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
            const labels = sorted.map(([n]) => n);
            const values = sorted.map(([, v]) => v);
            const colors = getPieColors(labels.length);

            _activeCharts[secId] = new Chart(canvas.getContext('2d'), {
                type: 'pie',
                data: {
                    labels,
                    datasets: [{ data: values, backgroundColor: colors, borderColor: '#111128', borderWidth: 2 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: c => `${c.label}: ${(c.raw * 100).toFixed(1)}%` } }
                    }
                }
            });

            const legendEl = document.getElementById('pie-legend-' + secId);
            if (legendEl) {
                legendEl.innerHTML = labels.map((lbl, i) => {
                    const short = lbl.length > 24 ? lbl.slice(0, 22) + '…' : lbl;
                    return `<div class="pie-legend-row">
                        <span class="pie-dot" style="background:${colors[i]}"></span>
                        <span>${short}</span>
                    </div>`;
                }).join('');
            }
        }

        function buildEditablePie(secId, data) {
            const canvas = document.getElementById('pie-canvas-' + secId);
            const editor = document.getElementById('weight-editor-' + secId);
            if (!canvas || !editor) return;

            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
            const colors = getPieColors(sorted.length);

            editor.innerHTML = sorted.map(([name, w], i) =>
                `<div class="weight-row">
                    <span class="pie-dot" style="background:${colors[i]}"></span>
                    <span class="weight-label" title="${name}">${name}</span>
                    <input type="number" class="weight-input" data-comp="${name}"
                        min="0.01" max="9999" step="0.1" value="${(w * 100).toFixed(1)}"
                        oninput="onWeightInput('${secId}')">
                </div>`
            ).join('');

            _activeCharts[secId] = new Chart(canvas.getContext('2d'), {
                type: 'pie',
                data: {
                    labels: sorted.map(([n]) => n),
                    datasets: [{
                        data: sorted.map(([, v]) => v),
                        backgroundColor: colors,
                        borderColor: '#111128',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: c => {
                                    const sum = c.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = sum > 0 ? (c.raw / sum * 100).toFixed(1) : '0.0';
                                    return `${c.label}: ${pct}%`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function onWeightInput(secId) {
            const chart = _activeCharts[secId];
            if (!chart) return;
            const inputs = document.querySelectorAll('#weight-editor-' + secId + ' .weight-input');
            chart.data.datasets[0].data = Array.from(inputs).map(inp => {
                const v = parseFloat(inp.value);
                return (isNaN(v) || v <= 0) ? 0.001 : v;
            });
            chart.update();
        }

        function applyWeights(secId) {
            const { editableNodeId } = _sectionData[secId];
            if (!editableNodeId) return;

            const inputs = document.querySelectorAll('#weight-editor-' + secId + ' .weight-input');
            const weights = {};
            let allValid = true;
            inputs.forEach(inp => {
                const v = parseFloat(inp.value);
                if (!isNaN(v) && v > 0) {
                    weights[inp.dataset.comp] = v;
                } else {
                    allValid = false;
                }
            });

            if (!allValid || !Object.keys(weights).length) {
                alert('All weights must be positive numbers.');
                return;
            }

            const btn = document.querySelector('#pie-container-' + secId + ' .apply-btn');
            if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

            fetch('/api/node/' + encodeURIComponent(editableNodeId) + '/weights', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ weights })
            })
            .then(r => r.json())
            .then(resp => {
                if (resp.error) {
                    alert('Error: ' + resp.error);
                    if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
                    return;
                }
                fetchNodeInfo(editableNodeId);
            })
            .catch(err => {
                alert('Request failed: ' + err);
                if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
            });
        }
    </script>
</body>
</html>
