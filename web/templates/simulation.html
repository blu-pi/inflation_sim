<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflation Simulation — Graph</title>
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
            color: #fffffe;
        }

        header {
            background: #0f0e17;
            padding: 0 16px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid #2a2a3e;
        }

        header span { font-weight: 600; font-size: 0.95rem; }

        header a {
            color: #a7a9be;
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.15s;
        }
        header a:hover { color: #fffffe; }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #network-container {
            flex: 1;
            position: relative;
            background: #16213e;
        }

        #network {
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 310px;
            background: #0f0e17;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #2a2a3e;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 10px 14px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a7a9be;
            border-bottom: 1px solid #2a2a3e;
            flex-shrink: 0;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .sidebar-body::-webkit-scrollbar { width: 4px; }
        .sidebar-body::-webkit-scrollbar-track { background: transparent; }
        .sidebar-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .hint {
            color: #a7a9be;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 48px;
            line-height: 1.5;
        }

        .node-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            word-break: break-all;
        }

        .layer-badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.03em;
        }

        .badge-raw       { background: #1565c0; color: #e3f2fd; }
        .badge-processed { background: #bf360c; color: #fbe9e7; }
        .badge-consumer  { background: #6a1b9a; color: #f3e5f5; }
        .badge-global    { background: #1b5e20; color: #e8f5e9; }

        .info-section { margin-bottom: 18px; }

        .info-section h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #a7a9be;
            margin-bottom: 8px;
        }

        .section-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .section-title-row h4 { margin-bottom: 0; }

        .comp-item {
            display: flex;
            align-items: center;
            padding: 4px 0;
            font-size: 0.78rem;
            border-bottom: 1px solid #1e1e30;
            gap: 6px;
        }

        .comp-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #d0d0e8;
        }

        .comp-bar {
            width: 60px;
            height: 4px;
            background: #2a2a4e;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .comp-bar-fill {
            height: 100%;
            background: #7986cb;
            border-radius: 2px;
        }

        .comp-pct {
            font-size: 0.72rem;
            color: #a7a9be;
            min-width: 34px;
            text-align: right;
            flex-shrink: 0;
        }

        .prop-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.78rem;
            border-bottom: 1px solid #1e1e30;
        }

        .prop-key { color: #a7a9be; }
        .prop-val { color: #fffffe; font-variant-numeric: tabular-nums; }

        .toolbar {
            padding: 8px 12px;
            background: #0f0e17;
            border-top: 1px solid #2a2a3e;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn {
            padding: 5px 13px;
            border-radius: 4px;
            border: 1px solid #3a3a5e;
            background: #1a1a2e;
            color: #d0d0e8;
            cursor: pointer;
            font-size: 0.78rem;
            transition: background 0.15s;
        }
        .btn:hover { background: #2a2a4e; }

        .legend {
            display: flex;
            gap: 14px;
            margin-left: auto;
            align-items: center;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: #a7a9be;
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        /* --- Pie chart styles --- */

        .btn-xs {
            padding: 2px 7px;
            font-size: 0.67rem;
            border-radius: 3px;
            border: 1px solid #3a3a5e;
            background: transparent;
            color: #a7a9be;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            line-height: 1.4;
        }
        .btn-xs:hover { background: #2a2a4e; color: #fffffe; }
        .btn-xs.active { background: #2e3461; color: #c5cae9; border-color: #5c6bc0; }

        .pie-container {
            margin-top: 8px;
            padding: 10px;
            background: #111128;
            border-radius: 5px;
            border: 1px solid #222244;
        }

        .pie-canvas-wrap {
            position: relative;
            height: 185px;
        }

        .weight-editor {
            margin-top: 8px;
            max-height: 130px;
            overflow-y: auto;
        }
        .weight-editor::-webkit-scrollbar { width: 3px; }
        .weight-editor::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .weight-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 0;
            border-bottom: 1px solid #1a1a30;
            font-size: 0.71rem;
        }

        .pie-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .weight-label {
            flex: 1;
            color: #c0c0d8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .weight-inputs {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
            align-items: center;
        }

        .input-unit {
            font-size: 0.60rem;
            color: #6a6a8a;
            flex-shrink: 0;
            line-height: 1;
        }

        .weight-input {
            width: 52px;
            padding: 2px 4px;
            background: #1a1a30;
            border: 1px solid #3a3a5e;
            border-radius: 3px;
            color: #fffffe;
            font-size: 0.71rem;
            text-align: right;
            flex-shrink: 0;
        }
        .weight-input:focus { outline: none; border-color: #7986cb; }

        .pie-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .apply-btn {
            padding: 3px 11px;
            font-size: 0.71rem;
            border-radius: 3px;
            border: 1px solid #5c6bc0;
            background: #3949ab;
            color: #e8eaf6;
            cursor: pointer;
            transition: background 0.15s;
        }
        .apply-btn:hover { background: #4a5abc; }
        .apply-btn:disabled { opacity: 0.6; cursor: default; }

        .cancel-btn {
            padding: 3px 11px;
            font-size: 0.71rem;
            border-radius: 3px;
            border: 1px solid #3a3a5e;
            background: transparent;
            color: #a7a9be;
            cursor: pointer;
            transition: background 0.15s;
        }
        .cancel-btn:hover { background: #2a2a4e; color: #fffffe; }

        .pie-legend-list { margin-top: 6px; }

        .pie-legend-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 2px 0;
            font-size: 0.70rem;
            color: #c0c0d8;
        }

        .pie-legend-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pie-legend-val {
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            font-size: 0.70rem;
            color: #a7a9be;
            white-space: nowrap;
        }

        .pie-legend-abs {
            font-size: 0.67rem;
            color: #5a5a7a;
            margin-left: 3px;
        }

        .pct-sum-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 0.65rem;
            color: #a7a9be;
            padding: 4px 0 0;
            gap: 3px;
        }

        .pct-sum-ok  { color: #66bb6a; font-weight: 600; }
        .pct-sum-warn { color: #ef5350; font-weight: 600; }

        .pie-warn {
            font-size: 0.68rem;
            color: #ef5350;
            padding: 4px 2px 0;
            line-height: 1.35;
        }

        /* --- Changelog modal --- */

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-box {
            background: #0f0e17;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            width: 640px;
            max-width: calc(100vw - 32px);
            max-height: calc(100vh - 64px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a3e;
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: #fffffe;
        }

        .modal-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a7a9be;
            font-size: 1.1rem;
            cursor: pointer;
            line-height: 1;
            padding: 2px 5px;
            border-radius: 3px;
            transition: color 0.15s, background 0.15s;
        }
        .modal-close:hover { color: #fffffe; background: #2a2a4e; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }
        .modal-body::-webkit-scrollbar { width: 4px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .cl-empty {
            color: #a7a9be;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 32px;
        }

        .cl-event {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 7px 0;
            border-bottom: 1px solid #1e1e30;
            font-size: 0.78rem;
        }

        .cl-step {
            flex-shrink: 0;
            background: #1a1a2e;
            border: 1px solid #3a3a5e;
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.68rem;
            color: #a7a9be;
            font-variant-numeric: tabular-nums;
            min-width: 44px;
            text-align: center;
        }

        .cl-type {
            flex-shrink: 0;
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.66rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .cl-type-unit_cost_changed  { background: #e65100; color: #ffe0b2; }
        .cl-type-weight_changed     { background: #1a237e; color: #c5cae9; }
        .cl-type-vertex_added       { background: #1b5e20; color: #c8e6c9; }
        .cl-type-vertex_removed     { background: #b71c1c; color: #ffcdd2; }

        .cl-detail { flex: 1; min-width: 0; line-height: 1.5; color: #d0d0e8; }
        .cl-product { font-weight: 600; color: #fffffe; }
        .cl-layer { color: #a7a9be; font-size: 0.72rem; margin-left: 4px; }
        .cl-change { color: #a7a9be; font-size: 0.74rem; margin-top: 2px; }
        .cl-old { color: #ef9a9a; }
        .cl-arrow { color: #5a5a7a; margin: 0 3px; }
        .cl-new { color: #a5d6a7; }
        .cl-comp { color: #80cbc4; }

        /* --- Snapshot modal --- */

        .snapshot-chart-wrap {
            position: relative;
            height: 200px;
            margin-bottom: 12px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }
        .stats-table th, .stats-table td {
            padding: 5px 8px;
            text-align: right;
            border-bottom: 1px solid #1e1e30;
            font-variant-numeric: tabular-nums;
        }
        .stats-table th { color: #a7a9be; font-weight: 600; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.06em; }
        .stats-table td:first-child, .stats-table th:first-child { text-align: left; color: #d0d0e8; }

        /* --- Data history modal --- */

        .history-chart-wrap {
            position: relative;
            height: 260px;
        }

        .history-empty {
            color: #a7a9be;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 48px;
        }

        .history-modal-box {
            background: #0f0e17;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            width: 680px;
            max-width: calc(100vw - 32px);
            max-height: calc(100vh - 64px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
    </style>
</head>
<body data-economy-id="{{ economy_id }}">
    <header>
        <span>Inflation Simulation &mdash; {{ economy_name }} (id {{ economy_id }})</span>
        <a href="/sim_view">&larr; Back to Timeline</a>
    </header>

    <div class="main">
        <div id="network-container">
            <div id="network"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">Node Information</div>
            <div class="sidebar-body" id="sidebar-body">
                <p class="hint">Click on any node<br>to see its details.</p>
            </div>
        </div>
    </div>

    <!-- Changelog modal -->
    <div class="modal-overlay" id="changelog-modal" onclick="onModalOverlayClick(event)">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">&#128221; Changelog</span>
                <div class="modal-header-actions">
                    <button class="btn" style="font-size:0.72rem;padding:3px 10px;" onclick="loadChangelog()">&#8635; Refresh</button>
                    <button class="modal-close" onclick="closeChangelog()" title="Close">&times;</button>
                </div>
            </div>
            <div class="modal-body" id="changelog-body">
                <p class="cl-empty">Loading…</p>
            </div>
        </div>
    </div>

    <!-- Snapshot modal -->
    <div class="modal-overlay" id="snapshot-modal" onclick="onSnapshotOverlayClick(event)">
        <div class="modal-box history-modal-box">
            <div class="modal-header">
                <span class="modal-title" id="snapshot-modal-title">&#9678; Snapshot</span>
                <button class="modal-close" onclick="closeSnapshotModal()" title="Close">&times;</button>
            </div>
            <div class="modal-body" id="snapshot-modal-body">
                <p class="history-empty">Loading&hellip;</p>
            </div>
        </div>
    </div>

    <!-- Data history modal -->
    <div class="modal-overlay" id="history-modal" onclick="onHistoryOverlayClick(event)">
        <div class="modal-box history-modal-box">
            <div class="modal-header">
                <span class="modal-title" id="history-modal-title">&#128200; Data History</span>
                <button class="modal-close" onclick="closeHistoryModal()" title="Close">&times;</button>
            </div>
            <div class="modal-body" id="history-modal-body">
                <p class="history-empty">Loading…</p>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn" onclick="resetView()">&#8635; Reset View</button>
        <button class="btn" onclick="exportPNG()">&#8659; Export PNG</button>
        <button class="btn" id="step-btn" onclick="stepTime()" style="border-color:#5c6bc0; color:#c5cae9;">&#9658; Next Step</button>
        <button class="btn" id="snapshot-btn" onclick="viewCurrentSnapshot()" style="border-color:#80cbc4; color:#80cbc4;">&#9678; View Snapshot</button>
        <button class="btn" id="changelog-btn" onclick="openChangelog()" style="border-color:#ff9800; color:#ffcc80;" title="View change log for this economy">&#128221; Changelog</button>
        <button class="btn" id="fork-btn" onclick="forkEconomy()" style="border-color:#ab47bc; color:#ce93d8;" title="Fork this economy — only allowed when no changes have been made at the current step">&#9683; Fork</button>
        <a class="btn" href="/economy/{{ economy_id }}/timeseries" style="border-color:#42a5f5; color:#90caf9; text-decoration:none;" title="Open time-series analytics for this economy">&#128200; Analytics</a>
        <span id="step-label" style="font-size:0.78rem; color:#a7a9be;"></span>
        <div class="legend">
            <div class="legend-item" id="global-legend-item" style="display:none">
                <div class="legend-dot" style="background:#7be141"></div>Global
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#97c2fc"></div>Raw
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#ffca50"></div>Processed
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#fb7e81"></div>Consumer
            </div>
        </div>
    </div>

    <script>
        const _economyId = parseInt(document.body.dataset.economyId, 10);
        const API_BASE = '/api/economy/' + _economyId;

        let network, nodes, edges;
        let _currentNodeId = null;
        let _currentStep = 0;
        let _globalsData = { active: false, globals: [] };

        fetch(API_BASE + '/globals')
            .then(r => r.json())
            .then(data => {
                _globalsData = data;
                if (data.active) {
                    const legendEl = document.getElementById('global-legend-item');
                    if (legendEl) legendEl.style.display = 'flex';
                }
            });

        fetch(API_BASE + '/graph')
            .then(r => r.json())
            .then(data => {
                nodes = new vis.DataSet(data.nodes);
                edges = new vis.DataSet(data.edges);

                const options = {
                    layout: {
                        hierarchical: {
                            enabled: true,
                            direction: 'UD',
                            sortMethod: 'directed',
                            levelSeparation: 170,
                            nodeSpacing: 90,
                            treeSpacing: 120,
                        }
                    },
                    groups: {
                        raw: {
                            color: {
                                background: '#97c2fc', border: '#5b8ecc',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                        processed: {
                            color: {
                                background: '#ffca50', border: '#cc9a00',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                        consumer: {
                            color: {
                                background: '#fb7e81', border: '#c45052',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                        global: {
                            color: {
                                background: '#7be141', border: '#4fa31e',
                                highlight: { background: '#ffd740', border: '#ffa000' }
                            }
                        },
                    },
                    nodes: {
                        shape: 'ellipse',
                        font: { size: 11, color: '#1a1a2e', bold: true },
                        borderWidth: 1.5,
                        size: 20,
                    },
                    edges: {
                        arrows: { to: { enabled: true, scaleFactor: 0.55 } },
                        color: { color: '#44446a', opacity: 0.8 },
                        width: 1,
                        smooth: { type: 'cubicBezier', forceDirection: 'vertical' },
                    },
                    physics: { enabled: false },
                    interaction: {
                        hover: true,
                        zoomView: true,
                        dragView: true,
                        tooltipDelay: 300,
                        selectConnectedEdges: false,
                    },
                };

                const container = document.getElementById('network');
                network = new vis.Network(container, { nodes, edges }, options);

                network.on('click', function (params) {
                    if (params.nodes.length > 0) {
                        const nodeId = params.nodes[0];
                        _currentNodeId = nodeId;
                        highlightEdges(nodeId);
                        fetchNodeInfo(nodeId);
                    } else if (params.nodes.length === 0 && params.edges.length === 0) {
                        _currentNodeId = null;
                        resetEdgeColors();
                        showHint();
                    }
                });

                refreshPrices();
            });

        function applyPrices(prices) {
            if (!nodes || !prices) return;
            const updates = [];
            for (const [nid, price] of Object.entries(prices)) {
                if (price !== null && price !== undefined) {
                    updates.push({ id: nid, label: nid + '\n$' + price.toFixed(4) });
                }
            }
            if (updates.length) nodes.update(updates);
        }

        function refreshPrices() {
            return fetch(API_BASE + '/prices')
                .then(r => r.json())
                .then(resp => {
                    if (resp && resp.prices) {
                        applyPrices(resp.prices);
                        if (typeof resp.step === 'number') {
                            _currentStep = resp.step;
                            if (resp.step > 0) {
                                document.getElementById('step-label').textContent = 'Step ' + resp.step;
                            }
                        }
                    }
                });
        }

        function highlightEdges(nodeId) {
            const updates = [];
            edges.forEach(edge => {
                if (edge.to === nodeId) {
                    updates.push({ id: edge.id, color: { color: '#2196f3', opacity: 1 }, width: 2.5 });
                } else if (edge.from === nodeId) {
                    updates.push({ id: edge.id, color: { color: '#4caf50', opacity: 1 }, width: 2.5 });
                } else {
                    updates.push({ id: edge.id, color: { color: '#222240', opacity: 0.25 }, width: 1 });
                }
            });
            edges.update(updates);
        }

        function resetEdgeColors() {
            const updates = [];
            edges.forEach(edge => {
                updates.push({ id: edge.id, color: { color: '#44446a', opacity: 0.8 }, width: 1 });
            });
            edges.update(updates);
        }

        function fetchNodeInfo(nodeId) {
            fetch(API_BASE + '/node/' + encodeURIComponent(nodeId))
                .then(r => r.json())
                .then(info => renderNodeInfo(info, nodeId));
        }

        const BADGE_CLASSES = {
            'Raw Material':       'badge-raw',
            'Processed Material': 'badge-processed',
            'Consumer Product':   'badge-consumer',
            'Global':             'badge-global',
        };

        function renderNodeInfo(info, nodeId) {
            destroyActiveCharts();
            const badge = BADGE_CLASSES[info.layer] || 'badge-raw';
            let html = `<div class="node-name">${info.name}</div>
                        <div class="layer-badge ${badge}">${info.layer}</div>`;

            const props = [['ID', info.id]];
            if (info.sale_price !== null && info.sale_price !== undefined)
                props.push(['Sale Price', '$' + info.sale_price.toFixed(4)]);
            if (info.units_avail !== undefined) props.push(['Units Available', info.units_avail]);
            if (info.num_components !== undefined) props.push(['# Components', info.num_components]);
            html += buildPropertiesSection('Properties', props, info, nodeId);

            if (info.components) {
                html += buildCompositionSection('Components', info.components, info.components_abs || null, '#7986cb', nodeId);
            }

            if (info.raw_composition) {
                html += buildCompositionSection('Raw Material Composition', info.raw_composition, null, '#80cbc4', null);
            }

            if (_globalsData.active && info.layer !== 'Global') {
                html += buildGlobalsSection(_globalsData.globals);
            }

            document.getElementById('sidebar-body').innerHTML = html;
        }

        function buildPropertiesSection(title, props, info, nodeId) {
            let html = `<div class="info-section"><h4>${title}</h4>`;
            if (info && info.unit_cost !== undefined && nodeId) {
                const ucVal = Number(info.unit_cost).toFixed(4);
                html += `<div class="prop-item">
                    <span class="prop-key">Unit Cost</span>
                    <span class="unit-cost-edit">
                        <input type="number" id="unit-cost-input" class="weight-input"
                               style="width:74px" step="0.01" min="0"
                               value="${ucVal}" data-original="${ucVal}"
                               oninput="onUnitCostInput()">
                        <button id="unit-cost-apply" class="apply-btn"
                                style="display:none;padding:1px 8px;font-size:0.66rem;margin-left:4px"
                                onclick="applyUnitCost('${nodeId}')">Apply</button>
                    </span>
                </div>`;
            }
            for (const [key, val] of props) {
                html += `<div class="prop-item">
                    <span class="prop-key">${key}</span>
                    <span class="prop-val">${val}</span>
                </div>`;
            }
            if (nodeId) {
                html += `<div style="margin-top:10px">
                    <button class="btn-xs" onclick="openHistoryModal('${nodeId}', '${(info.name || nodeId).replace(/'/g, "\\'")}')">&#128200; Data History</button>
                </div>`;
            }
            html += `</div>`;
            return html;
        }

        function onUnitCostInput() {
            const inp = document.getElementById('unit-cost-input');
            const btn = document.getElementById('unit-cost-apply');
            if (!inp || !btn) return;
            const changed = parseFloat(inp.value) !== parseFloat(inp.dataset.original);
            btn.style.display = changed ? 'inline-block' : 'none';
        }

        function applyUnitCost(nodeId) {
            const inp = document.getElementById('unit-cost-input');
            const btn = document.getElementById('unit-cost-apply');
            if (!inp) return;
            const v = parseFloat(inp.value);
            if (isNaN(v) || v < 0) {
                alert('Unit cost must be a non-negative number.');
                return;
            }
            if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

            fetch(API_BASE + '/node/' + encodeURIComponent(nodeId) + '/unit_cost', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ unit_cost: v })
            })
            .then(r => r.json())
            .then(resp => {
                if (resp.error) {
                    alert('Error: ' + resp.error);
                    if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
                    return;
                }
                fetchNodeInfo(nodeId);
            })
            .catch(err => {
                alert('Request failed: ' + err);
                if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
            });
        }

        function buildCompositionSection(title, data, absData, barColor, editableNodeId) {
            const secId = editableNodeId ? 'comp' : 'raw';
            _sectionData[secId] = { data, absData: absData || null, barColor, editableNodeId: editableNodeId || null };

            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
            let html = `<div class="info-section">
                <div class="section-title-row">
                    <h4>${title}</h4>
                    <button class="btn-xs" id="pie-btn-${secId}" onclick="togglePie('${secId}')">&#9685; Pie</button>
                </div>`;

            for (const [name, weight] of sorted) {
                const pct = (weight * 100).toFixed(1);
                html += `<div class="comp-item">
                    <span class="comp-label" title="${name}">${name}</span>
                    <div class="comp-bar">
                        <div class="comp-bar-fill" style="width:${pct}%;background:${barColor}"></div>
                    </div>
                    <span class="comp-pct">${pct}%</span>
                </div>`;
            }

            html += `<div id="pie-container-${secId}" class="pie-container" style="display:none">
                <div class="pie-canvas-wrap"><canvas id="pie-canvas-${secId}"></canvas></div>`;

            if (editableNodeId) {
                html += `<div id="weight-editor-${secId}" class="weight-editor"></div>
                    <div id="pct-sum-${secId}" class="pct-sum-row" style="display:none">
                        Sum: <span id="pct-sum-val-${secId}">0.0</span>%
                    </div>
                    <div id="pie-warn-${secId}" class="pie-warn" style="display:none"></div>
                    <div class="pie-actions">
                        <button class="cancel-btn" onclick="togglePie('${secId}')">Cancel</button>
                        <button class="apply-btn" onclick="applyWeights('${secId}')">Apply</button>
                    </div>`;
            } else {
                html += `<div id="pie-legend-${secId}" class="pie-legend-list"></div>`;
            }

            html += `</div></div>`;
            return html;
        }

        function buildGlobalsSection(globals) {
            let html = `<div class="info-section"><h4>Global Materials</h4>`;
            for (const g of globals) {
                html += `<div class="prop-item">
                    <span class="prop-key" style="cursor:pointer;color:#7be141;text-decoration:underline dotted;"
                          onclick="selectGlobalNode('${g.id}')" title="Click to inspect ${g.name}">${g.name}</span>
                    <span class="prop-val">$${g.unit_cost.toFixed(4)}</span>
                </div>`;
            }
            html += `</div>`;
            return html;
        }

        function selectGlobalNode(nodeId) {
            _currentNodeId = nodeId;
            if (network) {
                network.selectNodes([nodeId]);
                highlightEdges(nodeId);
            }
            fetchNodeInfo(nodeId);
        }

        function showHint() {
            document.getElementById('sidebar-body').innerHTML =
                '<p class="hint">Click on any node<br>to see its details.</p>';
        }

        function resetView() {
            if (!network) return;
            network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
            resetEdgeColors();
            showHint();
            network.unselectAll();
        }

        function exportPNG() {
            if (!network) return;
            const canvas = network.canvas.frame.canvas;
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'simulation_graph.png';
            link.click();
        }

        function stepTime() {
            const btn = document.getElementById('step-btn');
            btn.disabled = true;
            btn.textContent = 'Stepping…';

            fetch(API_BASE + '/timestep', { method: 'POST' })
                .then(r => r.json())
                .then(resp => {
                    if (resp.error) { alert('Step error: ' + resp.error); return; }

                    _currentStep = resp.step;
                    document.getElementById('step-label').textContent = 'Step ' + resp.step;
                    btn.textContent = '✓ Step ' + resp.step;
                    btn.disabled = false;

                    applyPrices(resp.prices);
                    if (_currentNodeId) fetchNodeInfo(_currentNodeId);
                })
                .catch(err => {
                    alert('Step failed: ' + err);
                    btn.disabled = false;
                    btn.textContent = '▶ Next Step';
                });
        }

        function forkEconomy() {
            const btn = document.getElementById('fork-btn');
            const label = document.getElementById('step-label');
            const prev = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Forking…';
            fetch(API_BASE + '/fork', { method: 'POST' })
                .then(r => r.json())
                .then(resp => {
                    if (resp.error) {
                        btn.textContent = prev;
                        btn.disabled = false;
                        // Show the reason inline next to the step label instead of a bare alert
                        const old = label.textContent;
                        label.style.color = '#ef9a9a';
                        label.textContent = resp.error;
                        setTimeout(() => {
                            label.style.color = '';
                            label.textContent = old;
                        }, 4000);
                        return;
                    }
                    window.location.href = '/sim_view';
                })
                .catch(err => {
                    alert('Fork failed: ' + err);
                    btn.textContent = prev;
                    btn.disabled = false;
                });
        }

        let _snapshotChart = null;

        function viewCurrentSnapshot() {
            if (_currentStep === 0) {
                openSnapshotModal(null);
                return;
            }
            fetch(API_BASE + '/snapshot/' + _currentStep)
                .then(r => r.json())
                .then(data => {
                    if (data.error) { alert(data.error); return; }
                    openSnapshotModal(data);
                });
        }

        function getStat(stats, label) {
            return stats.find(d => d.label === label) || {};
        }

        function openSnapshotModal(snapshot) {
            const modal = document.getElementById('snapshot-modal');
            const body = document.getElementById('snapshot-modal-body');
            const titleEl = document.getElementById('snapshot-modal-title');
            if (_snapshotChart) { _snapshotChart.destroy(); _snapshotChart = null; }
            if (!snapshot) {
                titleEl.textContent = '陸 Snapshot';
                body.innerHTML = '<p class="history-empty">No snapshot yet — advance the simulation first.</p>';
                modal.classList.add('open');
                return;
            }
            titleEl.textContent = '陸 Snapshot — step ' + snapshot.timestamp;
            const layerEntries = Object.entries(snapshot.layer_insights);
            const tableRows = layerEntries.map(([_, s]) => {
                const sp = getStat(s.stats, 'Sale Price');
                const uc = getStat(s.stats, 'Unit Cost');
                return `
                <tr>
                    <td>${s.layer_name}</td>
                    <td>${sp.count}</td>
                    <td>${fmtNum(sp.mean)}</td>
                    <td>${fmtNum(sp.population_stdev)}</td>
                    <td>${fmtNum(sp.min)}</td>
                    <td>${fmtNum(sp.max)}</td>
                    <td>${fmtNum(uc.mean)}</td>
                </tr>`;
            }).join('');
            body.innerHTML = `
                <div class="snapshot-chart-wrap"><canvas id="snapshot-chart-canvas"></canvas></div>
                <table class="stats-table">
                    <thead><tr>
                        <th>Layer</th><th>#</th><th>Mean Price</th><th>Std Dev</th>
                        <th>Min</th><th>Max</th><th>Mean Cost</th>
                    </tr></thead>
                    <tbody>${tableRows}</tbody>
                </table>
            `;
            modal.classList.add('open');
            const canvas = document.getElementById('snapshot-chart-canvas');
            const labels = layerEntries.map(([_, s]) => s.layer_name);
            const means = layerEntries.map(([_, s]) => getStat(s.stats, 'Sale Price').mean);
            const stds = layerEntries.map(([_, s]) => getStat(s.stats, 'Sale Price').population_stdev);
            const colors = ['#7986cb', '#80cbc4', '#ffb74d', '#ef5350', '#66bb6a'];
            _snapshotChart = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Mean Price',
                            data: means,
                            backgroundColor: labels.map((_, i) => colors[i % colors.length]),
                            borderColor: '#0f0e17',
                            borderWidth: 1,
                        },
                        {
                            label: 'Std Dev',
                            type: 'line',
                            data: stds,
                            borderColor: '#ffe0b2',
                            backgroundColor: 'rgba(255,224,178,0.2)',
                            tension: 0.25,
                            pointRadius: 4,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: { ticks: { color: '#a7a9be' }, grid: { color: '#1e1e30' } },
                        y: { ticks: { color: '#a7a9be' }, grid: { color: '#1e1e30' }, beginAtZero: true },
                    },
                    plugins: { legend: { labels: { color: '#d0d0e8' } } },
                },
            });
        }

        function closeSnapshotModal() {
            document.getElementById('snapshot-modal').classList.remove('open');
            if (_snapshotChart) { _snapshotChart.destroy(); _snapshotChart = null; }
        }

        function onSnapshotOverlayClick(e) {
            if (e.target === document.getElementById('snapshot-modal')) closeSnapshotModal();
        }

        function fmtNum(v) {
            if (v === null || v === undefined) return '—';
            return Number(v).toFixed(4);
        }

        /* ---- Pie chart logic ---- */

        const _sectionData = {};
        let _activeCharts = {};
        const _pctDirty = {};

        const PIE_COLORS = [
            '#7986cb', '#80cbc4', '#ffb74d', '#ef5350', '#66bb6a',
            '#26c6da', '#ab47bc', '#ec407a', '#ff7043', '#42a5f5',
            '#d4e157', '#26a69a'
        ];

        function getPieColors(n) {
            return Array.from({ length: n }, (_, i) => PIE_COLORS[i % PIE_COLORS.length]);
        }

        function destroyActiveCharts() {
            Object.values(_activeCharts).forEach(c => c.destroy());
            for (const k in _activeCharts) delete _activeCharts[k];
        }

        function togglePie(secId) {
            const container = document.getElementById('pie-container-' + secId);
            const btn = document.getElementById('pie-btn-' + secId);
            if (!container || !btn) return;

            const isHidden = !container.style.display || container.style.display === 'none';
            if (isHidden) {
                container.style.display = 'block';
                btn.classList.add('active');
                if (_activeCharts[secId]) { _activeCharts[secId].destroy(); delete _activeCharts[secId]; }
                const { editableNodeId } = _sectionData[secId];
                if (editableNodeId) buildEditablePie(secId);
                else buildReadOnlyPie(secId);
            } else {
                container.style.display = 'none';
                btn.classList.remove('active');
                if (_activeCharts[secId]) { _activeCharts[secId].destroy(); delete _activeCharts[secId]; }
            }
        }

        function buildReadOnlyPie(secId) {
            const canvas = document.getElementById('pie-canvas-' + secId);
            if (!canvas) return;

            const { data, absData } = _sectionData[secId];
            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
            const labels = sorted.map(([n]) => n);
            const values = sorted.map(([, v]) => v);
            const colors = getPieColors(labels.length);

            _activeCharts[secId] = new Chart(canvas.getContext('2d'), {
                type: 'pie',
                data: {
                    labels,
                    datasets: [{ data: values, backgroundColor: colors, borderColor: '#111128', borderWidth: 2 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: c => {
                                    const pct = `${(c.raw * 100).toFixed(1)}%`;
                                    if (absData && absData[c.label] !== undefined) {
                                        return `${c.label}: ${pct} (abs: ${absData[c.label].toFixed(4)})`;
                                    }
                                    return `${c.label}: ${pct}`;
                                }
                            }
                        }
                    }
                }
            });

            const legendEl = document.getElementById('pie-legend-' + secId);
            if (legendEl) {
                legendEl.innerHTML = labels.map((lbl, i) => {
                    const short = lbl.length > 22 ? lbl.slice(0, 20) + '…' : lbl;
                    const pct = (values[i] * 100).toFixed(1);
                    const absStr = absData && absData[lbl] !== undefined
                        ? `<span class="pie-legend-abs">(${absData[lbl].toFixed(2)})</span>`
                        : '';
                    return `<div class="pie-legend-row">
                        <span class="pie-dot" style="background:${colors[i]}"></span>
                        <span class="pie-legend-name" title="${lbl}">${short}</span>
                        <span class="pie-legend-val">${pct}%${absStr}</span>
                    </div>`;
                }).join('');
            }
        }

        function buildEditablePie(secId) {
            const canvas = document.getElementById('pie-canvas-' + secId);
            const editor = document.getElementById('weight-editor-' + secId);
            if (!canvas || !editor) return;

            _pctDirty[secId] = false;

            const { data, absData } = _sectionData[secId];
            const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
            const colors = getPieColors(sorted.length);

            editor.innerHTML = sorted.map(([name, w], i) => {
                const absVal = absData && absData[name] !== undefined ? absData[name] : null;
                const pct = (w * 100).toFixed(2);
                const absStr = absVal !== null ? absVal.toFixed(4) : (w * 100).toFixed(2);
                return `<div class="weight-row">
                    <span class="pie-dot" style="background:${colors[i]}"></span>
                    <span class="weight-label" title="${name}">${name}</span>
                    <div class="weight-inputs">
                        <span class="input-unit">A</span>
                        <input type="number" class="weight-input abs-input" data-comp="${name}"
                            min="0.0001" step="0.01" value="${absStr}"
                            oninput="onAbsInput('${secId}')">
                        <span class="input-unit">%</span>
                        <input type="number" class="weight-input pct-input" data-comp="${name}"
                            min="0.01" max="100" step="0.01" value="${pct}"
                            oninput="onPctInput('${secId}')">
                    </div>
                </div>`;
            }).join('');

            const initData = sorted.map(([name, w]) =>
                absData && absData[name] !== undefined ? absData[name] : w
            );

            _activeCharts[secId] = new Chart(canvas.getContext('2d'), {
                type: 'pie',
                data: {
                    labels: sorted.map(([n]) => n),
                    datasets: [{
                        data: initData,
                        backgroundColor: colors,
                        borderColor: '#111128',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: c => {
                                    const sum = c.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = sum > 0 ? (c.raw / sum * 100).toFixed(1) : '0.0';
                                    const abs = c.raw.toFixed(4);
                                    return `${c.label}: ${pct}% (abs: ${abs})`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function onAbsInput(secId) {
            _pctDirty[secId] = false;
            const editor = document.getElementById('weight-editor-' + secId);
            const absInputs = [...editor.querySelectorAll('.abs-input')];
            const pctInputs = [...editor.querySelectorAll('.pct-input')];

            const absVals = absInputs.map(inp => {
                const v = parseFloat(inp.value);
                return (isNaN(v) || v <= 0) ? 0 : v;
            });
            const total = absVals.reduce((a, b) => a + b, 0);

            absVals.forEach((v, i) => {
                pctInputs[i].value = total > 0 ? (v / total * 100).toFixed(2) : '0.00';
            });

            const chart = _activeCharts[secId];
            if (chart) {
                chart.data.datasets[0].data = absVals.map(v => v > 0 ? v : 0.0001);
                chart.update();
            }

            const sumRow = document.getElementById('pct-sum-' + secId);
            if (sumRow) sumRow.style.display = 'none';
            const warnEl = document.getElementById('pie-warn-' + secId);
            if (warnEl) warnEl.style.display = 'none';
        }

        function onPctInput(secId) {
            _pctDirty[secId] = true;
            const editor = document.getElementById('weight-editor-' + secId);
            const pctInputs = [...editor.querySelectorAll('.pct-input')];

            const pctVals = pctInputs.map(inp => {
                const v = parseFloat(inp.value);
                return isNaN(v) ? 0 : v;
            });
            const sum = pctVals.reduce((a, b) => a + b, 0);

            const sumRow = document.getElementById('pct-sum-' + secId);
            const sumValEl = document.getElementById('pct-sum-val-' + secId);
            if (sumRow && sumValEl) {
                sumRow.style.display = 'flex';
                sumValEl.textContent = sum.toFixed(1);
                sumValEl.className = Math.abs(sum - 100) <= 0.5 ? 'pct-sum-ok' : 'pct-sum-warn';
            }

            const chart = _activeCharts[secId];
            if (chart) {
                chart.data.datasets[0].data = pctVals.map(v => v > 0 ? v : 0.0001);
                chart.update();
            }
        }

        /* ---- Changelog modal ---- */

        function openChangelog() {
            document.getElementById('changelog-modal').classList.add('open');
            loadChangelog();
        }

        function closeChangelog() {
            document.getElementById('changelog-modal').classList.remove('open');
        }

        function onModalOverlayClick(e) {
            if (e.target === document.getElementById('changelog-modal')) closeChangelog();
        }

        function loadChangelog() {
            const body = document.getElementById('changelog-body');
            body.innerHTML = '<p class="cl-empty">Loading…</p>';

            fetch(API_BASE + '/changelog')
                .then(r => r.json())
                .then(resp => {
                    const events = resp.events || [];
                    if (!events.length) {
                        body.innerHTML = '<p class="cl-empty">No changes recorded yet.</p>';
                        return;
                    }
                    // Newest first
                    const sorted = [...events].sort((a, b) => b.timestamp - a.timestamp);
                    body.innerHTML = sorted.map(ev => renderChangelogEvent(ev)).join('');
                })
                .catch(err => {
                    body.innerHTML = `<p class="cl-empty" style="color:#ef5350">Failed to load: ${err}</p>`;
                });
        }

        const CL_TYPE_LABELS = {
            'UNIT_COST_CHANGED': 'Unit Cost',
            'WEIGHT_CHANGED':    'Weight',
            'VERTEX_ADDED':      'Added',
            'VERTEX_REMOVED':    'Removed',
        };

        function renderChangelogEvent(ev) {
            const typeKey = (ev.event_type || '').toUpperCase();
            const typeLabel = CL_TYPE_LABELS[typeKey] || ev.event_type;
            const typeClass = 'cl-type-' + (ev.event_type || '').toLowerCase();

            let detail = `<span class="cl-product">${ev.product_name}</span>` +
                         `<span class="cl-layer">(${ev.layer_name})</span>`;

            if (ev.component_name !== undefined && ev.component_name !== null) {
                const oldFmt = ev.old_value !== null && ev.old_value !== undefined
                    ? Number(ev.old_value).toFixed(4) : '—';
                const newFmt = ev.new_value !== null && ev.new_value !== undefined
                    ? Number(ev.new_value).toFixed(4) : '—';
                detail += `<div class="cl-change">` +
                    (ev.component_name ? `<span class="cl-comp">${ev.component_name}</span>: ` : '') +
                    `<span class="cl-old">${oldFmt}</span>` +
                    `<span class="cl-arrow">→</span>` +
                    `<span class="cl-new">${newFmt}</span>` +
                    `</div>`;
            } else if (ev.other_product) {
                detail += `<div class="cl-change"><span class="cl-comp">${ev.other_product}</span>` +
                    (ev.other_layer ? ` <span class="cl-layer">(${ev.other_layer})</span>` : '') +
                    `</div>`;
            }

            return `<div class="cl-event">
                <span class="cl-step">t${ev.timestamp}</span>
                <span class="cl-type ${typeClass}">${typeLabel}</span>
                <div class="cl-detail">${detail}</div>
            </div>`;
        }

        /* ---- Data history modal ---- */

        let _historyChart = null;

        function openHistoryModal(nodeId, nodeName) {
            document.getElementById('history-modal-title').textContent = '\u{1F4C8} Data History — ' + nodeName;
            document.getElementById('history-modal-body').innerHTML = '<p class="history-empty">Loading…</p>';
            document.getElementById('history-modal').classList.add('open');

            if (_historyChart) { _historyChart.destroy(); _historyChart = null; }

            fetch(API_BASE + '/node/' + encodeURIComponent(nodeId) + '/history')
                .then(r => r.json())
                .then(data => renderHistoryChart(data))
                .catch(err => {
                    document.getElementById('history-modal-body').innerHTML =
                        `<p class="history-empty" style="color:#ef5350">Failed to load: ${err}</p>`;
                });
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').classList.remove('open');
            if (_historyChart) { _historyChart.destroy(); _historyChart = null; }
        }

        function onHistoryOverlayClick(e) {
            if (e.target === document.getElementById('history-modal')) closeHistoryModal();
        }

        function renderHistoryChart(data) {
            const prices = data.sale_price || [];
            const costs  = data.total_cost || [];
            const maxLen = Math.max(prices.length, costs.length);

            const body = document.getElementById('history-modal-body');

            if (maxLen === 0) {
                body.innerHTML = '<p class="history-empty">No history recorded yet. Advance the simulation to collect data.</p>';
                return;
            }

            const labels = Array.from({ length: maxLen }, (_, i) => i + 1);
            body.innerHTML = '<div class="history-chart-wrap"><canvas id="history-chart-canvas"></canvas></div>';

            const canvas = document.getElementById('history-chart-canvas');
            const datasets = [];

            if (prices.length > 0) {
                datasets.push({
                    label: 'Sale Price',
                    data: prices,
                    borderColor: '#7986cb',
                    backgroundColor: 'rgba(121,134,203,0.12)',
                    borderWidth: 2,
                    pointRadius: prices.length > 40 ? 0 : 3,
                    tension: 0,
                    fill: false,
                });
            }

            if (costs.length > 0) {
                datasets.push({
                    label: 'Total Cost',
                    data: costs,
                    borderColor: '#ffb74d',
                    backgroundColor: 'rgba(255,183,77,0.10)',
                    borderWidth: 2,
                    pointRadius: costs.length > 40 ? 0 : 3,
                    tension: 0,
                    fill: false,
                });
            }

            _historyChart = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: {
                            title: { display: true, text: 'Time Step', color: '#a7a9be', font: { size: 11 } },
                            ticks: { color: '#a7a9be', maxTicksLimit: 12 },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                        y: {
                            title: { display: true, text: 'Value', color: '#a7a9be', font: { size: 11 } },
                            ticks: { color: '#a7a9be' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#d0d0e8', font: { size: 11 }, boxWidth: 14 },
                        },
                        tooltip: {
                            callbacks: {
                                title: items => 'Step ' + items[0].label,
                                label: c => `${c.dataset.label}: ${Number(c.raw).toFixed(4)}`,
                            }
                        }
                    }
                }
            });
        }

        function applyWeights(secId) {
            const { editableNodeId } = _sectionData[secId];
            if (!editableNodeId) return;

            const editor = document.getElementById('weight-editor-' + secId);
            const warnEl = document.getElementById('pie-warn-' + secId);
            const showWarn = msg => { if (warnEl) { warnEl.textContent = msg; warnEl.style.display = 'block'; } };
            const clearWarn = () => { if (warnEl) warnEl.style.display = 'none'; };

            const weights = {};
            let allValid = true;

            if (_pctDirty[secId]) {
                const pctInputs = [...editor.querySelectorAll('.pct-input')];
                const raw = {};
                let sum = 0;
                pctInputs.forEach(inp => {
                    const v = parseFloat(inp.value);
                    if (!isNaN(v) && v > 0) {
                        raw[inp.dataset.comp] = v;
                        sum += v;
                    } else {
                        allValid = false;
                    }
                });
                if (!allValid || sum <= 0) { showWarn('All percentages must be positive numbers.'); return; }
                // Preserve the original total absolute weight so that editing
                // relative (%) values only redistributes the existing mass,
                // rather than normalising everything to 1.0.
                const { absData } = _sectionData[secId];
                const origTotal = (absData && Object.keys(absData).length > 0)
                    ? Object.values(absData).reduce((a, b) => a + b, 0)
                    : 1.0;
                for (const k in raw) weights[k] = (raw[k] / sum) * origTotal;
            } else {
                const absInputs = [...editor.querySelectorAll('.abs-input')];
                absInputs.forEach(inp => {
                    const v = parseFloat(inp.value);
                    if (!isNaN(v) && v > 0) weights[inp.dataset.comp] = v;
                    else allValid = false;
                });
                if (!allValid || !Object.keys(weights).length) {
                    showWarn('All weights must be positive numbers.');
                    return;
                }
            }

            clearWarn();
            const btn = document.querySelector('#pie-container-' + secId + ' .apply-btn');
            if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

            fetch(API_BASE + '/node/' + encodeURIComponent(editableNodeId) + '/weights', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ weights })
            })
            .then(r => r.json())
            .then(resp => {
                if (resp.error) {
                    showWarn('Error: ' + resp.error);
                    if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
                    return;
                }
                fetchNodeInfo(editableNodeId);
            })
            .catch(err => {
                showWarn('Request failed: ' + err);
                if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
            });
        }
    </script>
</body>
</html>
