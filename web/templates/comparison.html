<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Comparison</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #fffffe;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #0f0e17;
            padding: 0 16px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid #2a2a3e;
        }
        header .title { font-weight: 600; font-size: 1rem; }
        header .nav-links { display: flex; gap: 14px; align-items: center; }
        header a {
            color: #c5cae9;
            text-decoration: none;
            font-size: 0.82rem;
            background: #283593;
            padding: 7px 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        header a:hover { background: #3949ab; }

        main {
            flex: 1;
            padding: 24px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: #a7a9be;
            font-size: 0.95rem;
        }
        .error-state {
            text-align: center;
            padding: 80px 20px;
            color: #ef5350;
            font-size: 0.95rem;
        }

        /* ---- Relation banner ---- */
        .relation-banner {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid #2a2a3e;
            background: #0f0e17;
            flex-wrap: wrap;
        }
        .relation-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 5px 12px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .rel-identical       { background: rgba(129,199,132,0.18); color: #81c784; border: 1px solid rgba(129,199,132,0.4); }
        .rel-ancestor        { background: rgba(100,181,246,0.18); color: #64b5f6; border: 1px solid rgba(100,181,246,0.4); }
        .rel-descendant      { background: rgba(206,147,216,0.18); color: #ce93d8; border: 1px solid rgba(206,147,216,0.4); }
        .rel-common_ancestor { background: rgba(255,183,77,0.18);  color: #ffb74d; border: 1px solid rgba(255,183,77,0.4); }
        .rel-null_relation   { background: rgba(239,83,80,0.18);   color: #ef5350; border: 1px solid rgba(239,83,80,0.4); }

        .relation-explanation {
            font-size: 0.85rem;
            color: #a7a9be;
            flex: 1;
            min-width: 200px;
        }

        /* ---- Economy cards ---- */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        .econ-card {
            background: #0f0e17;
            border-radius: 8px;
            border: 1px solid #2a2a3e;
            border-top: 4px solid var(--card-color, #5c6bc0);
            padding: 18px;
        }
        .econ-card .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fffffe;
        }
        .econ-card .card-meta {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 14px;
            font-size: 0.82rem;
        }
        .econ-card .meta-label { color: #a7a9be; }
        .econ-card .meta-value { color: #d0d0e8; font-variant-numeric: tabular-nums; }

        .vs-divider {
            display: none;
        }

        /* ---- Section heading ---- */
        .section-heading {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #a7a9be;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a3e;
        }

        /* ---- Event summary cards ---- */
        .event-summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }
        .event-summary-card {
            background: #0f0e17;
            border-radius: 8px;
            border: 1px solid #2a2a3e;
            padding: 16px;
            text-align: center;
        }
        .event-summary-card .count {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .event-summary-card .label {
            font-size: 0.74rem;
            color: #a7a9be;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .count-shared { color: #ffb74d; }
        .count-unique-a { color: #64b5f6; }
        .count-unique-b { color: #ce93d8; }
        .event-summary-card.clickable {
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .event-summary-card.clickable:hover {
            border-color: #5c6bc0;
            background: rgba(92,107,192,0.08);
        }

        /* ---- Event list ---- */
        .event-list-section {
            margin-bottom: 28px;
        }
        .event-list-section .section-heading {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .event-list-section .section-heading .collapse-arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.7rem;
        }
        .event-list-section.collapsed .event-list { display: none; }
        .event-list-section.collapsed .collapse-arrow { transform: rotate(-90deg); }

        .event-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .event-list li {
            display: flex;
            gap: 10px;
            padding: 7px 10px;
            border-bottom: 1px solid #1e1e30;
            font-size: 0.8rem;
            align-items: center;
        }
        .event-list li:hover { background: rgba(255,255,255,0.02); }

        .event-type-badge {
            display: inline-block;
            font-size: 0.64rem;
            padding: 2px 7px;
            border-radius: 3px;
            background: rgba(255,183,77,0.18);
            color: #ffb74d;
            border: 1px solid rgba(255,183,77,0.4);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .event-meta { color: #d0d0e8; flex: 1; min-width: 0; }
        .event-meta .event-target { color: #fffffe; font-weight: 500; }
        .event-meta .event-vals { color: #a7a9be; font-size: 0.74rem; }

        .event-empty {
            padding: 24px;
            text-align: center;
            color: #6a6a8a;
            font-size: 0.85rem;
        }

        /* ---- Responsive ---- */
        @media (max-width: 700px) {
            .cards-row, .event-summary-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <span class="title">Comparing <span id="hdr-econ-a">{{ a_name }}</span> vs <span id="hdr-econ-b">{{ b_name }}</span></span>
        <div class="nav-links">
            <a href="/sim_view">&larr; Timeline</a>
            <a href="/economy/{{ a_id }}">Open {{ a_name }}</a>
            <a href="/economy/{{ b_id }}">Open {{ b_name }}</a>
        </div>
    </header>

    <main id="main">
        <div class="loading-state" id="loading">Loading comparison data&hellip;</div>
        <div class="error-state" id="error" style="display:none"></div>
        <div id="content" style="display:none"></div>
    </main>

    <script>
        const A_ID = {{ a_id }};
        const B_ID = {{ b_id }};

        function escapeAttr(s) {
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatPrice(v) {
            if (v == null) return '—';
            return Number(v).toFixed(4);
        }

        function loadComparison() {
            fetch('/api/compare?a=' + A_ID + '&b=' + B_ID)
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('error').textContent = data.error;
                        document.getElementById('error').style.display = 'block';
                        document.getElementById('loading').style.display = 'none';
                        return;
                    }
                    document.getElementById('loading').style.display = 'none';
                    render(data);
                })
                .catch(err => {
                    document.getElementById('error').textContent = 'Failed to load comparison: ' + err.message;
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                });
        }

        function relationClass(rel) {
            const map = {
                'a and b are the same economy': 'identical',
                'a is ancestor of b': 'ancestor',
                'a is descendant of b': 'descendant',
                'a and b share at least one ancestor x': 'common_ancestor',
                'a and b are not related': 'null_relation',
            };
            return 'rel-' + (map[rel] || 'null_relation');
        }

        function relationShortLabel(rel) {
            const map = {
                'a and b are the same economy': 'IDENTICAL',
                'a is ancestor of b': 'A → B (ancestor)',
                'a is descendant of b': 'A ← B (descendant)',
                'a and b share at least one ancestor x': 'COMMON ANCESTOR',
                'a and b are not related': 'UNRELATED',
            };
            return map[rel] || rel;
        }

        function renderCard(info, label) {
            return `
                <div class="econ-card" style="--card-color:${escapeAttr(info.group_color || '#5c6bc0')}">
                    <div class="card-title">${label}: ${escapeAttr(info.name)}</div>
                    <div class="card-meta">
                        <span class="meta-label">ID</span><span class="meta-value">${info.id}</span>
                        <span class="meta-label">Group</span><span class="meta-value">${escapeAttr(info.group_name || '—')}</span>
                        <span class="meta-label">Current Step</span><span class="meta-value">${info.current_step}</span>
                        <span class="meta-label">Parent ID</span><span class="meta-value">${info.parent_id != null ? info.parent_id : '— (root)'}</span>
                        <span class="meta-label">Created @ Step</span><span class="meta-value">${info.creation_step != null ? info.creation_step : '—'}</span>
                    </div>
                </div>
            `;
        }

        function renderEventList(events, emptyMsg) {
            if (!events || events.length === 0) {
                return `<div class="event-empty">${emptyMsg}</div>`;
            }
            return '<ul class="event-list">' + events.map(e => {
                let vals = '';
                if (e.old_value != null && e.new_value != null) {
                    vals = ` &rarr; <span class="event-vals">${formatPrice(e.old_value)} → ${formatPrice(e.new_value)}</span>`;
                }
                let comp = e.component_name ? ` (${escapeAttr(e.component_name)})` : '';
                return `<li>
                    <span class="event-type-badge">${escapeAttr(e.event_type)}</span>
                    <span class="event-meta">
                        <span class="event-target">${escapeAttr(e.product_name)}${comp}</span>
                        <span class="event-vals">@t${e.timestamp} in ${escapeAttr(e.layer_name)}${vals}</span>
                    </span>
                </li>`;
            }).join('') + '</ul>';
        }

        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function render(data) {
            const shortRel = relationShortLabel(data.relation);
            const relCls = relationClass(data.relation);

            const sharedCount = data.shared_events.length;
            const uniqueACount = data.unique_events[String(A_ID)] ? data.unique_events[String(A_ID)].length : 0;
            const uniqueBCount = data.unique_events[String(B_ID)] ? data.unique_events[String(B_ID)].length : 0;

            const html = `
                <div class="relation-banner">
                    <span class="relation-badge ${relCls}">${escapeAttr(shortRel)}</span>
                    <span class="relation-explanation">${escapeAttr(data.relation)}</span>
                </div>

                <div class="cards-row">
                    ${renderCard(data.economy_a, 'Economy A')}
                    ${renderCard(data.economy_b, 'Economy B')}
                </div>

                <div class="section-heading">Change Event Comparison</div>

                <div class="event-summary-row">
                    <div class="event-summary-card clickable" onclick="scrollToSection('shared-events')">
                        <div class="count count-shared">${sharedCount}</div>
                        <div class="label">Shared Events</div>
                    </div>
                    <div class="event-summary-card clickable" onclick="scrollToSection('unique-events-a')">
                        <div class="count count-unique-a">${uniqueACount}</div>
                        <div class="label">Unique to ${escapeAttr(data.economy_a.name)}</div>
                    </div>
                    <div class="event-summary-card clickable" onclick="scrollToSection('unique-events-b')">
                        <div class="count count-unique-b">${uniqueBCount}</div>
                        <div class="label">Unique to ${escapeAttr(data.economy_b.name)}</div>
                    </div>
                </div>

                <div class="event-list-section" id="shared-events-section">
                    <div class="section-heading" onclick="this.parentElement.classList.toggle('collapsed')">
                        <span class="collapse-arrow">▼</span>
                        Shared Events (${sharedCount})
                    </div>
                    ${renderEventList(data.shared_events, 'No events are shared between these two economies.')}
                </div>

                <div class="event-list-section" id="unique-events-a-section">
                    <div class="section-heading" onclick="this.parentElement.classList.toggle('collapsed')">
                        <span class="collapse-arrow">▼</span>
                        Events Unique to ${escapeAttr(data.economy_a.name)} (${uniqueACount})
                    </div>
                    ${renderEventList(data.unique_events[String(A_ID)], 'No unique events for ' + escapeAttr(data.economy_a.name) + '.')}
                </div>

                <div class="event-list-section" id="unique-events-b-section">
                    <div class="section-heading" onclick="this.parentElement.classList.toggle('collapsed')">
                        <span class="collapse-arrow">▼</span>
                        Events Unique to ${escapeAttr(data.economy_b.name)} (${uniqueBCount})
                    </div>
                    ${renderEventList(data.unique_events[String(B_ID)], 'No unique events for ' + escapeAttr(data.economy_b.name) + '.')}
                </div>
            `;

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').style.display = 'block';
        }

        loadComparison();
    </script>
</body>
</html>
